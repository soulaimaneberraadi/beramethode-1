
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BERAMETHODE</title>
    <meta name="description" content="BERAMETHODE — ERP pour l'industrie textile : coûts de revient, planification, magasin, RH, facturation et suivi de production." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#14211C">
    <!-- Tailwind : build local via PostCSS (voir tailwind.config.js + src/index.css).
         Fini le CDN runtime — meilleur Performance + Best Practices. -->

    <!-- Anti-FOUC: يطبق الثيم قبل أول رسم -->
    <script>
      (function(){try{var t=localStorage.getItem('bera_theme');
       var d=t==='dark'||(!t)||((t==='system')&&matchMedia('(prefers-color-scheme:dark)').matches);
       if(d)document.documentElement.classList.add('dark');}catch(e){}})();
    </script>

    <style>
      /* الحرج فقط لـ First Paint */
      html, body, #root { max-width: 100%; overflow-x: hidden; }
      :root { color-scheme: light; }
      .dark { color-scheme: dark; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
      * { scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.1) transparent; }
      .dark ::-webkit-scrollbar-thumb { background: rgba(194,210,202,0.18); }
      .dark .glass-card { background: rgba(20,33,28,0.72); border-color: rgba(157,181,171,0.10); }
      .glass-card { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
      @media print { :root,.dark { color-scheme: light; } .dark * { background:#fff!important;color:#000!important; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
