<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tableau de Bord</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <span>BERAMETHODE Dev Server</span>
    </header>
    <section class="grid" id="cards">
      <div class="card">
        <div class="card-title">OF EN COURS</div>
        <div class="card-value" id="c1">0</div>
        <div class="card-sub">0% avancement</div>
      </div>
      <div class="card">
        <div class="card-title">EFFECTIF ACTIF</div>
        <div class="card-value" id="c2">100</div>
        <div class="card-sub">0 présents aujourd'hui</div>
      </div>
      <div class="card">
        <div class="card-title">VALEUR STOCK</div>
        <div class="card-value" id="c3">666.4k</div>
        <div class="card-sub">1 alerte(s) stock</div>
      </div>
      <div class="card">
        <div class="card-title">AVANCES EN COURS</div>
        <div class="card-value" id="c4">4.5k</div>
        <div class="card-sub">0 demande(s) approx</div>
      </div>
      <div class="card">
        <div class="card-title">MODÈLES ACTIFS</div>
        <div class="card-value" id="c5">0</div>
        <div class="card-sub">En planification ou suivi</div>
      </div>
      <div class="card">
        <div class="card-title">EFFECTIF PRESENT</div>
        <div class="card-value" id="c6">0</div>
        <div class="card-sub">Aujourd'hui (fiches suivies)</div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
  </html>
