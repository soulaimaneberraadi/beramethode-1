<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BERAMETHODE 1 — Dependency Graph</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#020617;color:#f8fafc;font-family:'Outfit',sans-serif;overflow:hidden;height:100vh}
  #canvas{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%)}
  #ui{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10}
  
  #header{position:absolute;top:30px;left:30px;pointer-events:none}
  #header h1{font-size:1.8rem;font-weight:700;background:linear-gradient(to right,#818cf8,#c084fc,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.02em}
  #header p{font-size:.85rem;color:#94a3b8;margin-top:4px;font-weight:400}
  
  #legend{position:absolute;bottom:30px;left:30px;background:rgba(15,23,42,.6);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:20px;pointer-events:auto;backdrop-filter:blur(16px);box-shadow:0 10px 40px -10px rgba(0,0,0,0.5)}
  #legend h3{font-size:.7rem;font-weight:700;color:#475569;letter-spacing:.15em;text-transform:uppercase;margin-bottom:15px}
  .leg{display:flex;align-items:center;gap:12px;margin-bottom:8px;font-size:.75rem;color:#cbd5e1;cursor:pointer;transition:all 0.2s}
  .leg:hover{color:#fff;transform:translateX(4px)}
  .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;box-shadow:0 0 10px currentColor}
  
  #tooltip{position:absolute;background:rgba(15,23,42,.9);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px;pointer-events:none;display:none;font-size:.8rem;max-width:300px;backdrop-filter:blur(20px);box-shadow:0 20px 50px rgba(0,0,0,0.5);z-index:100}
  #tooltip h4{color:#fff;font-weight:700;margin-bottom:8px;font-size:1rem}
  #tooltip p{color:#94a3b8;line-height:1.6;font-weight:300}
  #tooltip .meta{margin-top:12px;font-size:.7rem;color:#6366f1;font-weight:600;display:flex;gap:10px}
  
  #search-container{position:absolute;top:30px;right:30px;pointer-events:auto;width:320px}
  #search-input{width:100%;background:rgba(15,23,42,.6);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px 18px;color:#fff;font-family:inherit;font-size:.9rem;backdrop-filter:blur(12px);transition:all 0.3s;outline:none}
  #search-input:focus{border-color:#6366f1;box-shadow:0 0 0 4px rgba(99,102,241,0.15);background:rgba(15,23,42,0.8)}
  
  #controls{position:absolute;bottom:30px;right:30px;display:flex;gap:10px;pointer-events:auto}
  .btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,.1);color:#fff;border-radius:12px;padding:10px 16px;cursor:pointer;font-size:.85rem;font-family:inherit;transition:all .2s;backdrop-filter:blur(8px);display:flex;align-items:center;gap:8px}
  .btn:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,.3);transform:translateY(-2px)}
  .btn:active{transform:translateY(0)}
  
  #stats{position:absolute;top:90px;right:30px;background:rgba(15,23,42,.4);border-radius:16px;padding:15px;font-size:.75rem;color:#64748b;border:1px solid rgba(255,255,255,.05);backdrop-filter:blur(4px)}
  #stats span{display:flex;justify-content:space-between;gap:20px;margin-bottom:4px}
  #stats b{color:#f8fafc}

  .glow-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle at 0% 0%, rgba(99,102,241,0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(6,182,212,0.05) 0%, transparent 50%);
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div class="glow-overlay"></div>
  <div id="header">
    <h1>BERAMETHODE 1 Architecture</h1>
    <p>Project Structure & Module Inter-dependencies</p>
  </div>
  <div id="search-container">
    <input type="text" id="search-input" placeholder="Search modules (e.g. 'auth', 'hr', 'db')..." autocomplete="off">
  </div>
  <div id="legend">
    <h3>Layers</h3>
    <div class="leg" onclick="filterGroup('entry')"><span class="dot" style="color:#6366f1;background:#6366f1"></span> Entry / Config</div>
    <div class="leg" onclick="filterGroup('frontend')"><span class="dot" style="color:#8b5cf6;background:#8b5cf6"></span> Frontend Pages</div>
    <div class="leg" onclick="filterGroup('server')"><span class="dot" style="color:#06b6d4;background:#06b6d4"></span> API Controllers</div>
    <div class="leg" onclick="filterGroup('lib')"><span class="dot" style="color:#10b981;background:#10b981"></span> Business Logic</div>
    <div class="leg" onclick="filterGroup('utils')"><span class="dot" style="color:#f59e0b;background:#f59e0b"></span> Utils / Tools</div>
    <div class="leg" onclick="filterGroup('db')"><span class="dot" style="color:#f43f5e;background:#f43f5e"></span> Data Persistence</div>
  </div>
  <div id="tooltip">
    <h4 id="tt-name"></h4>
    <p id="tt-desc"></p>
    <div class="meta">
      <span id="tt-group"></span>
      <span id="tt-links"></span>
    </div>
  </div>
  <div id="stats">
    <span><b>Nodes</b> <span id="st-nodes">0</span></span>
    <span><b>Edges</b> <span id="st-edges">0</span></span>
  </div>
  <div id="controls">
    <button class="btn" onclick="resetView()">Reset View</button>
    <button class="btn" id="phys-btn" onclick="togglePhysics()">Pause Simulation</button>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const ttName = document.getElementById('tt-name');
const ttDesc = document.getElementById('tt-desc');
const ttGroup = document.getElementById('tt-group');
const ttLinks = document.getElementById('tt-links');
const searchInput = document.getElementById('search-input');

// ---------- DATA ----------
const COLORS = {
  entry:   '#6366f1',
  frontend:'#8b5cf6',
  server:  '#06b6d4',
  lib:     '#10b981',
  utils:   '#f59e0b',
  db:      '#f43f5e',
};

const nodes = [
  // Entry
  {id:'server.ts',   label:'server.ts',         group:'entry',    desc:'Express entry point. Registers all API routes, Vite middleware, JWT middleware, rate limiting.'},
  {id:'index.tsx',   label:'index.tsx',          group:'entry',    desc:'React DOM root. Mounts App.tsx.'},
  {id:'vite.config', label:'vite.config.ts',     group:'entry',    desc:'Vite build config. Plugins: react, obfuscator.'},
  {id:'tsconfig',    label:'tsconfig.json',      group:'entry',    desc:'TypeScript compiler options for full-stack project.'},
  {id:'constants',   label:'constants.ts',       group:'entry',    desc:'Global app constants, enums, shared config values.'},
  {id:'types',       label:'types.ts',           group:'entry',    desc:'Shared TypeScript type definitions across frontend & backend.'},

  // Frontend pages / components
  {id:'App',        label:'App.tsx',             group:'frontend', desc:'Root React component. Navigation router, global state, module switcher.'},
  {id:'Dashboard',  label:'Dashboard.tsx',       group:'frontend', desc:'KPI dashboard. Pulls /api/dashboard/kpis.'},
  {id:'Magasin',    label:'Magasin.tsx',         group:'frontend', desc:'Warehouse module. Products, lots, mouvements, commandes, dechets.'},
  {id:'Planning',   label:'Planning.tsx',        group:'frontend', desc:'Production planning. Calendar + Gantt view.'},
  {id:'Effectifs',  label:'Effectifs.tsx',       group:'frontend', desc:'Basic workforce tracking, pointage, skills.'},
  {id:'GESTION_RH', label:'GESTION-RH.tsx',      group:'frontend', desc:'Full HR module. Dossiers, avances, Sage export, invitations.'},
  {id:'Chrono',     label:'Chronometrage.tsx',   group:'frontend', desc:'Time study module. Cycle time recording & analysis.'},
  {id:'Gamme',      label:'Gamme.tsx',           group:'frontend', desc:'Operation routing / gamme operatoire management.'},
  {id:'SuiviProd',  label:'SuiviProduction.tsx', group:'frontend', desc:'Production tracking board. Live suivi per poste.'},
  {id:'Implant',    label:'Implantation.tsx',    group:'frontend', desc:'Factory layout & implantation editor.'},
  {id:'Facturation',label:'Facturation.tsx',     group:'frontend', desc:'Invoicing: factures, BL, paiements.'},
  {id:'Config',     label:'Configuration.tsx',   group:'frontend', desc:'App settings panel.'},
  {id:'Library',    label:'Library.tsx',         group:'frontend', desc:'Operations / vocabulary library.'},
  {id:'Balancing',  label:'Balancing.tsx',       group:'frontend', desc:'Line balancing tool.'},
  {id:'PageMachine',label:'PageMachine.tsx',     group:'frontend', desc:'Machine catalogue & QR management.'},
  {id:'FicheTech',  label:'FicheTechnique.tsx',  group:'frontend', desc:'Product technical data sheet.'},
  {id:'OrderModel', label:'OrderModelPage.tsx',  group:'frontend', desc:'Order + simulation per model.'},

  // Server controllers
  {id:'authCtrl',   label:'authController',     group:'server',   desc:'Register, login, logout, JWT, password reset, nodemailer.'},
  {id:'userCtrl',   label:'userController',     group:'server',   desc:'User management, role updates, admin guard.'},
  {id:'magCtrl',    label:'magasinController',  group:'server',   desc:'Products, lots, mouvements, commandes, demandes, dechets.'},
  {id:'hrCtrl',     label:'hrController',       group:'server',   desc:'HR dossiers, pointage, production, avances, PIN, BERAOUVIER.'},
  {id:'hrIdCtrl',   label:'hrIdentityCtrl',     group:'server',   desc:'Worker invitations & token-based onboarding.'},
  {id:'hrSageCtrl', label:'hrSageController',   group:'server',   desc:'Sage export generation (CSV/XLSX) per month.'},
  {id:'planCtrl',   label:'planningController', group:'server',   desc:'Planning events CRUD.'},
  {id:'suiviCtrl',  label:'suiviController',    group:'server',   desc:'Suivi production data + stats.'},
  {id:'wrkCtrl',    label:'workersController',  group:'server',   desc:'Basic worker CRUD + bulk import.'},
  {id:'skillCtrl',  label:'workerSkillsCtrl',   group:'server',   desc:'Worker skills + auto-update from suivi.'},
  {id:'ptCtrl',     label:'pointageController', group:'server',   desc:'Worker pointage CRUD + activity.'},
  {id:'factCtrl',   label:'facturationCtrl',    group:'server',   desc:'Factures, bons livraison, paiements.'},
  {id:'dashCtrl',   label:'dashboardController',group:'server',   desc:'KPI aggregation query from SQLite.'},
  {id:'gemCtrl',    label:'geminiController',   group:'server',   desc:'AI endpoints: analyze-textile, suggest-vocab, generate-ops.'},
  {id:'modelCtrl',  label:'modelController',    group:'server',   desc:'CRUD for product models.'},
  {id:'settCtrl',   label:'settingsController', group:'server',   desc:'App settings get/save.'},
  {id:'middleware',  label:'middleware.ts',      group:'server',   desc:'authenticateToken JWT middleware.'},
  {id:'jwtConfig',  label:'jwtConfig.ts',       group:'server',   desc:'JWT secret, Helmet toggle.'},

  // Lib / business logic
  {id:'db',         label:'server/db.ts',       group:'db',       desc:'better-sqlite3 database. All schema migrations, table init.'},
  {id:'geminiAi',   label:'geminiAi.ts',        group:'server',   desc:'Google GenAI SDK wrapper. Prompt templates for textile analysis.'},
  {id:'geminiSvc',  label:'services/gemini.ts', group:'lib',      desc:'Gemini service abstraction layer.'},
  {id:'bootSeq',    label:'bootSequence.ts',    group:'lib',      desc:'App boot sequence, DB health check.'},
  {id:'pointGrill', label:'pointageGrille.ts',  group:'lib',      desc:'Pointage grid engine. Shift rules, hours calculation.'},
  {id:'sageTime',   label:'sageTimeRules.ts',   group:'lib',      desc:'Sage payroll time rules engine.'},
  {id:'sageMonthPay',label:'sageMonthPay.ts',   group:'lib',      desc:'Monthly pay computation for Sage export.'},
  {id:'sageHrSvc',  label:'sageHeuresSvc',      group:'lib',      desc:'Sage heures service integration.'},
  {id:'methEngine', label:'methodesEngine.ts',  group:'lib',      desc:'Industrial methods engine. Time calculations, gamme logic.'},
  {id:'suiviCtxR',  label:'suiviContextResolver',group:'lib',     desc:'Resolves context for suivi entries.'},
  {id:'effectObs',  label:'effectifsObservations',group:'lib',    desc:'Effectifs observation helpers.'},
  {id:'calcHrs',    label:'calculerHeuresPointage',group:'lib',   desc:'Compute hours from pointage records.'},
  {id:'capacity',   label:'utils/capacity.ts',  group:'utils',    desc:'Capacity calculation utilities.'},
  {id:'efficiency', label:'utils/efficiency.ts',group:'utils',    desc:'Efficiency & rendement utilities.'},
  {id:'lots',       label:'utils/lots.ts',      group:'utils',    desc:'Lot management utilities.'},
  {id:'machMatch',  label:'utils/machineMatch', group:'utils',    desc:'Machine affectation matching algorithm.'},
  {id:'planning_u', label:'utils/planning.ts',  group:'utils',    desc:'Planning computation utilities.'},
  {id:'matNeeds',   label:'utils/materialNeeds',group:'utils',    desc:'Material requirements calculation.'},
  {id:'supplLT',    label:'utils/supplierLeadtime',group:'utils', desc:'Supplier leadtime computation.'},

  // Scripts
  {id:'genJournal', label:'generate-journalier-excel',group:'utils',desc:'Generate daily Excel journal exports via ExcelJS.'},
  {id:'seedHR',     label:'seed-hr-100-test',   group:'utils',    desc:'Seed 100 test HR workers into DB.'},
  {id:'seedMag',    label:'seed-magasin-demo',  group:'utils',    desc:'Seed demo magasin products.'},
  {id:'genDemoMach',label:'generate-demo-machines',group:'utils', desc:'Generate demo machine data.'},
];

const edges = [
  // server.ts → controllers
  {from:'server.ts',to:'authCtrl'},{from:'server.ts',to:'userCtrl'},
  {from:'server.ts',to:'magCtrl'},{from:'server.ts',to:'hrCtrl'},
  {from:'server.ts',to:'hrIdCtrl'},{from:'server.ts',to:'hrSageCtrl'},
  {from:'server.ts',to:'planCtrl'},{from:'server.ts',to:'suiviCtrl'},
  {from:'server.ts',to:'wrkCtrl'},{from:'server.ts',to:'skillCtrl'},
  {from:'server.ts',to:'ptCtrl'},{from:'server.ts',to:'factCtrl'},
  {from:'server.ts',to:'dashCtrl'},{from:'server.ts',to:'gemCtrl'},
  {from:'server.ts',to:'modelCtrl'},{from:'server.ts',to:'settCtrl'},
  {from:'server.ts',to:'middleware'},{from:'server.ts',to:'jwtConfig'},
  // controllers → db
  {from:'authCtrl',to:'db'},{from:'magCtrl',to:'db'},{from:'hrCtrl',to:'db'},
  {from:'hrIdCtrl',to:'db'},{from:'hrSageCtrl',to:'db'},{from:'planCtrl',to:'db'},
  {from:'suiviCtrl',to:'db'},{from:'wrkCtrl',to:'db'},{from:'skillCtrl',to:'db'},
  {from:'ptCtrl',to:'db'},{from:'factCtrl',to:'db'},{from:'dashCtrl',to:'db'},
  {from:'userCtrl',to:'db'},{from:'modelCtrl',to:'db'},{from:'settCtrl',to:'db'},
  // controllers → lib
  {from:'gemCtrl',to:'geminiAi'},{from:'geminiAi',to:'geminiSvc'},
  {from:'hrSageCtrl',to:'sageMonthPay'},{from:'hrSageCtrl',to:'sageHrSvc'},
  {from:'hrCtrl',to:'calcHrs'},{from:'ptCtrl',to:'pointGrill'},
  {from:'sageMonthPay',to:'sageTime'},{from:'sageHrSvc',to:'sageTime'},
  // index → App
  {from:'index.tsx',to:'App'},{from:'App',to:'Dashboard'},
  {from:'App',to:'Magasin'},{from:'App',to:'Planning'},
  {from:'App',to:'Effectifs'},{from:'App',to:'GESTION_RH'},
  {from:'App',to:'Chrono'},{from:'App',to:'Gamme'},
  {from:'App',to:'SuiviProd'},{from:'App',to:'Implant'},
  {from:'App',to:'Facturation'},{from:'App',to:'Config'},
  {from:'App',to:'Library'},{from:'App',to:'Balancing'},
  {from:'App',to:'PageMachine'},{from:'App',to:'FicheTech'},
  {from:'App',to:'OrderModel'},
  // frontend → constants/types
  {from:'App',to:'constants'},{from:'App',to:'types'},
  {from:'Gamme',to:'methEngine'},{from:'Chrono',to:'methEngine'},
  {from:'Planning',to:'planning_u'},{from:'Planning',to:'capacity'},
  {from:'Balancing',to:'efficiency'},{from:'Magasin',to:'lots'},
  {from:'OrderModel',to:'matNeeds'},{from:'OrderModel',to:'supplLT'},
  {from:'PageMachine',to:'machMatch'},
  // scripts → db
  {from:'genJournal',to:'db'},{from:'seedHR',to:'db'},
  {from:'seedMag',to:'db'},{from:'genDemoMach',to:'db'},
  {from:'bootSeq',to:'db'},{from:'server.ts',to:'bootSeq'},
  {from:'SuiviProd',to:'suiviCtxR'},{from:'GESTION_RH',to:'effectObs'},
];

document.getElementById('st-nodes').textContent = nodes.length;
document.getElementById('st-edges').textContent = edges.length;

// ---------- LAYOUT ----------
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

const nodeMap = {};
nodes.forEach(n => {
  n.x = Math.random() * W * .6 + W * .2;
  n.y = Math.random() * H * .6 + H * .2;
  n.vx = 0; n.vy = 0;
  n.r = n.group === 'entry' ? 24 : 18;
  n.color = COLORS[n.group] || '#6366f1';
  n.pulse = 0;
  nodeMap[n.id] = n;
});

// Force-directed initial layout by group
const groupCenters = {
  entry:   {x:W*.5,  y:H*.15},
  frontend:{x:W*.2,  y:H*.5},
  server:  {x:W*.75, y:H*.4},
  lib:     {x:W*.6,  y:H*.75},
  utils:   {x:W*.3,  y:H*.8},
  db:      {x:W*.85, y:H*.7},
};
nodes.forEach(n => {
  const gc = groupCenters[n.group] || {x:W*.5,y:H*.5};
  n.x = gc.x + (Math.random()-.5)*180;
  n.y = gc.y + (Math.random()-.5)*120;
});

// ---------- PHYSICS ----------
let physics = true;
let frame = 0;
let particles = []; // Particle effects for edges

function tick() {
  if (physics || frame < 200) {
    frame++;
    const REPEL = 4500, SPRING = .04, DAMP = .8, GRAVITY = .015;
    nodes.forEach(a => {
      nodes.forEach(b => {
        if (a===b) return;
        let dx=a.x-b.x, dy=a.y-b.y, d=Math.sqrt(dx*dx+dy*dy)||1;
        if(d > 500) return;
        let f=REPEL/(d*d);
        a.vx+=f*dx/d; a.vy+=f*dy/d;
      });
    });
    edges.forEach(e => {
      const a=nodeMap[e.from], b=nodeMap[e.to];
      if(!a||!b)return;
      let dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      let f=(d-140)*SPRING;
      a.vx+=f*dx/d; a.vy+=f*dy/d;
      b.vx-=f*dx/d; b.vy-=f*dy/d;
      
      // Randomly spawn edge particles
      if(physics && Math.random() < 0.02) {
        particles.push({x:a.x, y:a.y, tx:b.x, ty:b.y, progress:0, color:a.color, speed:0.005 + Math.random()*0.01});
      }
    });
    
    nodes.forEach(n => {
      const c=groupCenters[n.group]||{x:W*.5,y:H*.5};
      n.vx+=(c.x-n.x)*GRAVITY; n.vy+=(c.y-n.y)*GRAVITY;
      n.vx*=DAMP; n.vy*=DAMP;
      n.x+=n.vx; n.y+=n.vy;
      n.x=Math.max(40,Math.min(W-40,n.x));
      n.y=Math.max(40,Math.min(H-40,n.y));
      n.pulse += 0.05;
    });

    // Update particles
    particles = particles.filter(p => {
      p.progress += p.speed;
      const from = nodeMap[edges.find(e=>nodeMap[e.from].color===p.color)?.from]; // approximate
      const to = nodeMap[edges.find(e=>nodeMap[e.to].color===p.color)?.to]; // approximate
      // Real update would need particle to keep edge reference
      return p.progress < 1;
    });
  }
  draw();
  requestAnimationFrame(tick);
}

// ---------- CAMERA ----------
let cam = {x:0,y:0,z:1};
function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(cam.x,cam.y);
  ctx.scale(cam.z,cam.z);

  // draw edges
  edges.forEach(e => {
    const a=nodeMap[e.from], b=nodeMap[e.to];
    if(!a||!b)return;
    
    // Highlight logic
    const isSearchMatch = searchQuery && (a.id.toLowerCase().includes(searchQuery) || b.id.toLowerCase().includes(searchQuery));
    const isHovered = hoveredNode && (hoveredNode.id===e.from || hoveredNode.id===e.to);
    
    ctx.save();
    ctx.globalAlpha = (hoveredNode || searchQuery) ? (isHovered || isSearchMatch ? 0.6 : 0.05) : 0.2;
    
    const grad=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
    grad.addColorStop(0,a.color); grad.addColorStop(1,b.color);
    ctx.strokeStyle=grad;
    ctx.lineWidth = isHovered || isSearchMatch ? 2 : 1;
    
    const dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy);
    const ex=b.x-dx/d*b.r, ey=b.y-dy/d*b.r;
    const sx=a.x+dx/d*a.r, sy=a.y+dy/d*a.r;

    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(ex, ey);
    ctx.stroke();

    // particles on highlighted edges
    if(isHovered || isSearchMatch || (physics && Math.random() < 0.01)) {
        const t = (Date.now() / 2000 + (a.x+a.y)/100) % 1;
        const px = sx + (ex-sx)*t;
        const py = sy + (ey-sy)*t;
        ctx.fillStyle = b.color;
        ctx.beginPath(); ctx.arc(px,py,2,0,Math.PI*2); ctx.fill();
    }
    
    ctx.restore();
  });

  // draw nodes
  nodes.forEach(n => {
    const isSearchMatch = searchQuery && n.id.toLowerCase().includes(searchQuery);
    const isHov = hoveredNode && hoveredNode.id===n.id;
    const isConn = hoveredNode && connected.has(n.id);
    const dim = (hoveredNode || searchQuery) && !isHov && !isConn && !isSearchMatch;
    
    ctx.save();
    ctx.globalAlpha = dim ? .15 : 1;
    
    // Pulse effect
    if(!dim && (isHov || isSearchMatch)) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r + Math.sin(n.pulse)*4 + 4, 0, Math.PI*2);
        ctx.strokeStyle = n.color + '44';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    // Shadow
    ctx.shadowBlur = isHov || isSearchMatch ? 20 : 10;
    ctx.shadowColor = n.color;

    // Node body
    const g2=ctx.createRadialGradient(n.x-n.r*.2,n.y-n.r*.2,0,n.x,n.y,n.r);
    g2.addColorStop(0, '#fff');
    g2.addColorStop(0.2, n.color);
    g2.addColorStop(1, n.color + 'bb');
    
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle=g2; ctx.fill();
    
    ctx.strokeStyle= (isHov || isSearchMatch) ?'#fff': 'rgba(255,255,255,0.1)';
    ctx.lineWidth= (isHov || isSearchMatch) ? 3 : 1.5;
    ctx.stroke();
    
    // Label
    ctx.shadowBlur = 0;
    ctx.fillStyle= dim ? '#475569' : '#f8fafc';
    ctx.font=`${(isHov || isSearchMatch)?'700':'400'} ${cam.z>0.6?12:10}px 'Outfit'`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    
    const label = n.label;
    if(cam.z > 0.4 || isHov || isSearchMatch) {
        ctx.fillText(label, n.x, n.y + n.r + 14);
    }
    
    ctx.restore();
  });
  ctx.restore();
}

// ---------- INTERACTION ----------
let hoveredNode = null;
let connected = new Set();
let dragging = null, dragOX=0, dragOY=0;
let panStart = null, camStart = null;

function getConnected(n) {
  const s = new Set();
  edges.forEach(e => {
    if(e.from===n.id) s.add(e.to);
    if(e.to===n.id) s.add(e.from);
  });
  return s;
}

function screenToWorld(sx,sy) {
  return {x:(sx-cam.x)/cam.z, y:(sy-cam.y)/cam.z};
}

function nodeAt(sx,sy) {
  const {x,y}=screenToWorld(sx,sy);
  return nodes.find(n=>Math.hypot(n.x-x,n.y-y)<n.r+6)||null;
}

let searchQuery = "";
searchInput.addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
});

canvas.addEventListener('mousemove',e=>{
  const n=nodeAt(e.clientX,e.clientY);
  hoveredNode=n;
  connected=n?getConnected(n):new Set();
  if(n){
    ttName.textContent=n.label;
    ttDesc.textContent=n.desc;
    ttGroup.textContent = n.group.toUpperCase();
    ttLinks.textContent = `${getConnected(n).size} connections`;
    
    tooltip.style.display='block';
    tooltip.style.left=Math.min(e.clientX+20,W-320)+'px';
    tooltip.style.top=Math.min(e.clientY+20,H-200)+'px';
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.style.display='none';
    canvas.style.cursor = 'default';
  }
  if(dragging){
    const w=screenToWorld(e.clientX,e.clientY);
    dragging.x=w.x; dragging.y=w.y;
    dragging.vx=0; dragging.vy=0;
  }
  if(panStart&&!dragging){
    cam.x=camStart.x+(e.clientX-panStart.x);
    cam.y=camStart.y+(e.clientY-panStart.y);
  }
});

canvas.addEventListener('mousedown',e=>{
  const n=nodeAt(e.clientX,e.clientY);
  if(n){dragging=n;}
  else {panStart={x:e.clientX,y:e.clientY};camStart={x:cam.x,y:cam.y};}
});

canvas.addEventListener('mouseup',()=>{dragging=null;panStart=null;});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:.91;
  const wx=(e.clientX-cam.x)/cam.z, wy=(e.clientY-cam.y)/cam.z;
  cam.z=Math.max(.15,Math.min(3,cam.z*f));
  cam.x=e.clientX-wx*cam.z;
  cam.y=e.clientY-wy*cam.z;
},{passive:false});

window.addEventListener('resize',()=>{
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
});

function resetView(){
  cam={x:0,y:0,z:1};
  frame = 0; // trigger layout re-run
}
function togglePhysics(){
  physics=!physics;
  document.getElementById('phys-btn').textContent=physics?'Pause Simulation':'Resume Simulation';
}

function filterGroup(group) {
    searchQuery = group;
    searchInput.value = group;
}

tick();
</script>
