<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BERAMETHODE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 400px;
      height: 300px;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo-wrap {
      margin-bottom: 20px;
    }

    .logo-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #059669);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    .logo-letter {
      font-size: 36px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -1px;
    }

    .app-name {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .app-tagline {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }

    .status-text {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 14px;
    }

    .spinner-track {
      width: 180px;
      height: 3px;
      background: #e2e8f0;
      border-radius: 9999px;
      overflow: hidden;
    }

    .spinner-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #10b981, #34d399);
      border-radius: 9999px;
      animation: slide 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(550%); }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo-circle">
      <span class="logo-letter">B</span>
    </div>
  </div>
  <div class="app-name">BERAMETHODE</div>
  <div class="app-tagline">Système ERP Textile</div>
  <div class="status-text">Démarrage…</div>
  <div class="spinner-track">
    <div class="spinner-bar"></div>
  </div>
</body>
</html>
