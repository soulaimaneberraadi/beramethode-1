<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:;" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      background: transparent;
    }
    .card {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      background: linear-gradient(160deg, #ffffff 0%, #f1f5f9 100%);
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      -webkit-app-region: drag;
    }
    .logo {
      width: 92px; height: 92px; border-radius: 26px;
      background: linear-gradient(145deg, #10b981 0%, #059669 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 28px -8px rgba(16,185,129,.55);
      animation: pop .5s cubic-bezier(.2,.8,.2,1.2);
    }
    .logo span { color: #fff; font-size: 50px; font-weight: 800; line-height: 1; }
    @keyframes pop { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .name { font-size: 26px; font-weight: 800; letter-spacing: 2px; color: #0f172a; }
    .name b { color: #10b981; }
    .tag { font-size: 12.5px; color: #64748b; letter-spacing: .5px; margin-top: -8px; }
    .bar {
      width: 200px; height: 5px; border-radius: 99px;
      background: #e2e8f0; overflow: hidden; margin-top: 10px;
    }
    .bar::after {
      content: ''; display: block; height: 100%; width: 40%;
      border-radius: 99px;
      background: linear-gradient(90deg, #34d399, #10b981);
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    .status { font-size: 11.5px; color: #94a3b8; letter-spacing: .4px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>B</span></div>
    <div class="name">BERA<b>METHODE</b></div>
    <div class="tag">Système ERP Textile</div>
    <div class="bar"></div>
    <div class="status">Démarrage…</div>
  </div>
</body>
</html>
