<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="#1e293b"/>

  <!-- Emerald inner circle -->
  <circle cx="128" cy="128" r="96" fill="#059669"/>

  <!-- Subtle gradient overlay -->
  <radialGradient id="g" cx="40%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#34d399" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#065f46" stop-opacity="0"/>
  </radialGradient>
  <circle cx="128" cy="128" r="96" fill="url(#g)"/>

  <!-- Letter B -->
  <text
    x="128"
    y="168"
    text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Arial, sans-serif"
    font-size="120"
    font-weight="800"
    fill="#ffffff"
    letter-spacing="-4"
  >B</text>
</svg>
